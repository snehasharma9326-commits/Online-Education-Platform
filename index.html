<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduLearn | Login</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, Helvetica, sans-serif;
        }
        body{
            height:100vh;
            background: linear-gradient(to right, #fff3e0, #e3f2fd);
            display:flex;
            justify-content:center;
            align-items:center;
        }
        
        .login-box{
            width:90%;
            height: 90%;
            background:white;
            border-radius:16px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
            display:flex;
            overflow:hidden;
        }
        .left{
            width:45%;
            background:linear-gradient(rgba(90, 18, 215, 0.85),rgba(92, 18, 218, 0.85)),
            url('https://images.unsplash.com/photo-1523580846011-d3a5bc25702b');
            background-size:cover;
            background-position:center;
            color:white;
            padding:40px;
            display:flex;
            flex-direction:column;
            justify-content:center;
        }
        .left h1{
            font-size:42px;
            margin-bottom:15px;
        }
        .left p{
            font-size:16px;
            line-height:1.6;
        }
        .right{
            width:55%;
            padding:40px;
        }
        .right h2{
            color:#4f46e5;
            margin-bottom:10px;
            font-size:32px;
        }
        .right p{
            margin-bottom:25px;
            color:#555;
        }
        .input-box{
            margin-bottom:15px;
        }
        .input-box label{
            display:block;
            margin-bottom:5px;
            font-weight:bold;
        }
        .input-box input{
            width:100%;
            padding:12px;
            border-radius:25px;
            border:1px solid #ccc;
            outline:none;
        }
        .input-box input:focus{
            border-color:#4f46e5;
        }
        .input-box a{
            display:inline-block;
            text-align: center;
            margin-left:220px ;
            
            background:#4f46e5;
            color:#fff;
            padding:10px 20px;
            border-radius:5px;
            text-decoration:none;
            font-size:14px;
        }
        .btn{
            width:100%;
            padding:12px;
            border:none;
            border-radius:25px;
            background:#9922d8;
            color:white;
            font-size:16px;
            cursor:pointer;
            margin-top:10px;
        }
        .btn:hover{
            background:#6b21cb;
        }
        @media(max-width:768px){
            .login-box{
                flex-direction:column;
                width:95%;
            }
            .left,.right{
                width:100%;
            }
        }
    </style>
</head>
<body>

<div
 class="login-box">
    <div class="left">
        <h1>EduLearn</h1>
        <p>Learn programming with simple notes, examples, and projects. Start your learning journey with EduLearn.</p>
    </div>

    <div class="right">
        <h2>Student Login</h2>
        <p>Enter your details to continue</p>

        
        <form action="welcome.html">
            <div class="input-box">
                <label>Name</label>
                <input type="text" placeholder="Enter your name" required>
            </div>
            <div class="input-box">
                <label>Date of Birth</label>
                <input type="date" required>
            </div>
            <div class="input-box">
                <label>Mobile Number</label>
                <input type="tel" placeholder="Enter mobile number" required>
            </div>
            <div class="input-box">
                <label>Age</label>
                <input type="number" placeholder="Enter age" required>
                <br>
                <br>
                <br>
                <br>
                 <a href="02_HOME_PAGE.html">login</a>
                 
            </div>
            
        </form>
    </div>
</div>

</body>
</html>
